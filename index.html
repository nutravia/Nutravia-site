<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Produit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .product {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      background: white;
      padding: 20px;
      border-radius: 15px;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .images {
      flex: 1;
    }

    .main-img {
      width: 100%;
      border-radius: 10px;
    }

    .thumbs {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .thumbs img {
      width: 70px;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
    }

    .thumbs img:hover {
      transform: scale(1.1);
    }

    .details {
      flex: 1;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
    }

    .price {
      font-size: 20px;
      color: green;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      background: black;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
    }

    .whatsapp {
      background: #25D366;
    }

    .reviews {
      margin-top: 40px;
    }

    .review {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .product {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- المنتج -->
  <div class="product">

    <!-- الصور -->
    <div class="images">
      <img id="mainImage" src="images/product1.jpg" class="main-img">

      <div class="thumbs">
        <img src="images/product1.jpg" onclick="changeImage(this.src)">
        <img src="images/product2.jpg" onclick="changeImage(this.src)">
        <img src="images/product3.jpg" onclick="changeImage(this.src)">
      </div>
    </div>

    <!-- المعلومات -->
    <div class="details">
      <div class="title">Nom du produit</div>
      <div class="price">199 MAD</div>

      <p>
        Produit de haute qualité. Idéal pour usage quotidien avec résultats rapides.
      </p>

      <a href="#" class="btn">Acheter maintenant</a>

      <!-- زر واتساب -->
      <a href="https://wa.me/212XXXXXXXXX" class="btn whatsapp">
        Commander sur WhatsApp
      </a>
    </div>

  </div>

  <!-- آراء الزبناء -->
  <div class="reviews">
    <h2>⭐ Avis des clients</h2>

    <div class="review">👍 Produit incroyable ! Je recommande.</div>
    <div class="review">🔥 Qualité top et livraison rapide.</div>
    <div class="review">💯 Très satisfait, merci !</div>
  </div>

</div>

<script>
function changeImage(src) {
  document.getElementById("mainImage").src = src;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutravia Collagène Marin</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f4f7f6;
}

header {
    background:#0f3d2e;
    color:white;
    padding:15px;
    text-align:center;
}

.hero {
    text-align:center;
    padding:30px;
}

.hero img {
    width:260px;
    border-radius:10px;
}

h1 {
    color:#0f3d2e;
}

.btn {
    background:#0f3d2e;
    color:white;
    padding:15px 25px;
    text-decoration:none;
    border-radius:8px;
    display:inline-block;
    margin-top:15px;
    font-weight:bold;
}

.section {
    background:white;
    margin:20px;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

.features {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.feature {
    width:250px;
    margin:10px;
}

.countdown {
    font-size:24px;
    color:red;
    margin-top:10px;
}

form input, form button {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

form button {
    background:#0f3d2e;
    color:white;
    font-size:16px;
    border:none;
}

.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    font-size:20px;
}
</style>
</head>

<body>

<header>
    <h2>NUTRAVIA</h2>
</header>

<div class="hero">
    <img src="https://via.placeholder.com/260" alt="product">
    <h1>Collagène Marin</h1>
    <p>بشرة مشرقة - شعر قوي - مفاصل صحية</p>

    <div class="countdown" id="countdown">00:10:00</div>

    <a href="#order" class="btn">اطلب الآن</a>
</div>

<div class="section">
    <h2>🔥 الفوائد</h2>
    <div class="features">
        <div class="feature">
            <h3>✨ بشرة ناعمة</h3>
            <p>يحسن مظهر البشرة بسرعة</p>
        </div>
        <div class="feature">
            <h3>💇‍♀️ شعر قوي</h3>
            <p>يقوي الشعر ويمنع التساقط</p>
        </div>
        <div class="feature">
            <h3>🦴 مفاصل صحية</h3>
            <p>يخفف آلام المفاصل</p>
        </div>
    </div>
</div>

<div class="section">
    <h2>📦 عرض خاص اليوم</h2>
    <p>توصيل مجاني + الدفع عند الاستلام</p>
</div>

<div class="section" id="order">
    <h2>🛒 اطلب الآن</h2>
    <form onsubmit="sendWhatsApp(event)">
        <input type="text" id="name" placeholder="الاسم الكامل" required>
        <input type="text" id="phone" placeholder="رقم الهاتف" required>
        <input type="text" id="city" placeholder="المدينة" required>
        <button type="submit">تأكيد الطلب</button>
    </form>
</div>

<a class="whatsapp" href="https://wa.me/212XXXXXXXXX">💬</a>

<script>
// Countdown
let time = 600;
setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;
    document.getElementById("countdown").innerHTML =
        `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    time--;
}, 1000);

// WhatsApp Form
function sendWhatsApp(e){
    e.preventDefault();
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let city = document.getElementById("city").value;

    let message = `طلب جديد:%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالمدينة: ${city}`;
    window.open(`https://wa.me/212XXXXXXXXX?text=${message}`);
}
</script>

</body>
</html>
